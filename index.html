<!DOCTYPE html>

<html lang="en">
  <head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Jonathan Cahal — ML Engineer</title>
  <meta name="description" content="Jonathan Cahal — ML Engineer building end-to-end machine learning systems.">

  <link href="assets/css/all.min.css" rel="stylesheet"> <!-- FontAwesome -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="shortcut icon" type="image/png" href="assets/favicon.png">

</head>

  <body>
    <div id="app">
      <header>
        <div id="particles">
          <section class="info">
            <h1>Jonathan Cahal</h1>
            <p>ML Engineer</p>
            <div class="info-links">
              <a aria-label="Send email" href="mailto:jacahal@gmail.com"><i class="icon-info fa fa-paper-plane" aria-hidden="true"></i></a>
              <a aria-label="My Github" target="_blank" href="https://github.com/jcahal"><i class="icon-info fab fa-github-alt" aria-hidden="true"></i></a>
              <a aria-label="My Résumé" target="_blank" href="https://jcahal.github.io/assets/Jonathan-Cahal-Résumé.pdf"><i class="icon-info fas fa-file-alt" aria-hidden="true"></i></a>
            </div>
          </section>
        </div>
      </header>

      <main>
        <section class="about-section">
          <div class="section-inner">
            <p class="about-text">{{ about }}</p>
          </div>
        </section>

        <section class="projects-section">
          <div class="section-inner">
            <h2 class="section-title">Projects</h2>
            <div class="projects">
              <article v-for="project in projects" class="project">
                <img class="project-image" v-bind:src="project.image" v-bind:alt="project.imageAlt" />
                <div class="project-body">
                  <h3>{{ project.name }}</h3>
                  <p>{{ project.description }}</p>
                  <div class="project-links">
                    <a v-if="project.url" v-bind:href="project.url" target="_blank" aria-label="Live demo"><i class="icon-project fas fa-globe" aria-hidden="true"></i></a>
                    <a v-if="project.source" v-bind:href="project.source" target="_blank" aria-label="Source code"><i class="icon-project fab fa-github-alt" aria-hidden="true"></i></a>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </section>

        <hr class="section-divider" />

        <section class="skills-section">
          <div class="section-inner">
            <h2 class="section-title">Skills</h2>
            <div class="skill-groups">
              <div v-for="group in skillGroups" class="skill-group">
                <h3 class="skill-group-name">{{ group.name }}</h3>
                <div class="skill-tags">
                  <span v-for="skill in group.skills" class="skill-tag">{{ skill }}</span>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <div class="footer-inner">
          <span class="footer-name">Jonathan Cahal &copy; 2026</span>
          <div class="footer-links">
            <a aria-label="Send email" href="mailto:jacahal@gmail.com"><i class="icon-info fa fa-paper-plane" aria-hidden="true"></i></a>
            <a aria-label="My Github" target="_blank" href="https://github.com/jcahal"><i class="icon-info fab fa-github-alt" aria-hidden="true"></i></a>
            <a aria-label="My Résumé" target="_blank" href="https://jcahal.github.io/assets/Jonathan-Cahal-Résumé.pdf"><i class="icon-info fas fa-file-alt" aria-hidden="true"></i></a>
          </div>
        </div>
      </footer>
    </div>

    <script src="assets/js/vue.min.js"></script>
    <script src="app/data.js"></script>
    <script src="app/app.vue.js"></script>
    <script src="assets/js/particles.min.js"></script>
    <script src="assets/js/sweet-scroll.min.js"></script>
    <script src="assets/js/main.js"></script>

  </body>
</html>
